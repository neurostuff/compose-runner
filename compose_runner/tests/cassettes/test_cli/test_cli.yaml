        "updated_at": null, "user": null, "name": "Intranasal oxytocin alters amygdala-temporal
        resting-state functional connectivity in body dysmorphic disorder: A double-blind
        placebo-controlled randomized trial", "description": "The present study assessed
        the effects of intranasal oxytocin on the neural basis of processing emotional
        faces in patients with body dysmorphic disorder (BDD). Twenty BDD patients
        and 22 matched healthy control participants participated in a randomized,
        double-blind placebo-controlled within-subject functional magnetic resonance
        imaging study. Following acute intranasal OXT (24 IU) or placebo administration,
        we examined group and OXT related differences in task-based amygdala activation
        and related functional connectivity in response to an emotional face-matching
        task of fearful, angry, disgusted, sad, surprised and happy faces. ", "publication":
