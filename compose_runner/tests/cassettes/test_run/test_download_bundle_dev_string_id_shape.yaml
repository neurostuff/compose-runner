\"2022-06-02T17:12:09.250150+00:00\",\"updated_at\":\"2024-03-21T19:59:24.570420+00:00\",\"user\":null,\"name\":\"Metabolic
        and electric brain patterns during pleasant and unpleasant emotions induced
        by music masterpieces.\",\"description\":\"Brain correlates comparing pleasant
        and unpleasant states induced by three dissimilar masterpiece excerpts were
        obtained. Related emotional reactions to the music were studied using Principal
        Component Analysis of validated reports, fMRI, and EEG coherent activity.
        A piano selection by Bach and a symphonic passage from Mahler widely differing
        in musical features were used as pleasing pieces. A segment by Prodromides
        was used as an unpleasing stimulus. Ten consecutive 30 s segments of each
        piece alternating with random static noise were played to 19 non-musician
        volunteers for a total of 30 min of auditory stimulation. Both brain approaches
        identified a left cortical network involved with pleasant feelings (Bach and
        Mahler vs. Prodromides) including the left primary auditory area, posterior
        temporal, inferior parietal and prefrontal regions. While the primary auditory
        zone may provide an early affective quality, left cognitive areas may contribute
        to pleasant feelings when melodic sequences follow expected rules. In contrast,
        unpleasant emotions (Prodromides vs. Bach and Mahler) involved the activation
        of the right frontopolar and paralimbic areas. Left activation with pleasant
        and right with unpleasant musical feelings is consistent with right supremacy
        in novel situations and left in predictable processes. When all musical excerpts
        were jointly compared to noise, in addition to bilateral auditory activation,
        the left temporal pole, inferior frontal gyrus, and frontopolar area were
        activated suggesting that cognitive and language processes were recruited
        in general responses to music. Sensory and cognitive integration seems required
        for musical emotion.\",\"publication\":\"International journal of psychophysiology
