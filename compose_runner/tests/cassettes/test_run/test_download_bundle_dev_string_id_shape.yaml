        brain basis of piano performance\",\"description\":\"Performances of memorized
        piano compositions unfold via dynamic integrations of motor, perceptual, cognitive,
        and emotive operations. The functional neuroanatomy of such elaborately skilled
        achievements was characterized in the present study by using (15)0-water positron
        emission tomography to image blindfolded pianists performing a concerto by
        J.S. Bach. The resulting brain activity was referenced to that for bimanual
        performance of memorized major scales. Scales and concerto performances both
        activated primary motor cortex, corresponding somatosensory areas, inferior
        parietal cortex, supplementary motor area, motor cingulate, bilateral superior
        and middle temporal cortex, right thalamus, anterior and posterior cerebellum.
        Regions specifically supporting the concerto performance included superior
        and middle temporal cortex, planum polare, thalamus, basal ganglia, posterior
        cerebellum, dorsolateral premotor cortex, right insula, right supplementary
        motor area, lingual gyrus, and posterior cingulate. Areas specifically implicated
        in generating and playing scales were posterior cingulate, middle temporal,
        right middle frontal, and right precuneus cortices, with lesser increases
        in right hemispheric superior temporal, temporoparietal, fusiform, precuneus,
        and prefrontal cortices, along with left inferior frontal gyrus. Finally,
        much greater deactivations were present for playing the concerto than scales.
        This seems to reflect a deeper attentional focus in which tonically active
        orienting and evaluative processes, among others, are suspended. This inference
        is supported by observed deactivations in posterior cingulate, parahippocampus,
        precuneus, prefrontal, middle temporal, and posterior cerebellar cortices.
        For each of the foregoing analyses, a distributed set of interacting localized
        functions is outlined for future test.\",\"publication\":\"Neuropsychologia\",\"doi\":\"10.1016/j.neuropsychologia.2004.11.007\",\"pmid\":\"15707905\",\"authors\":\"L.
        Parsons; J. Sergent; D. Hodges; P. Fox\",\"year\":2005,\"metadata\":{\"slug\":\"15707905-10-1016-j-neuropsychologia-2004-11-007\",\"source\":\"semantic_scholar\",\"raw_metadata\":{\"pubmed\":{\"PubmedData\":{\"History\":{\"PubMedPubDate\":[{\"Day\":\"15\",\"Hour\":\"9\",\"Year\":\"2005\",\"Month\":\"2\",\"Minute\":\"0\",\"@PubStatus\":\"pubmed\"},{\"Day\":\"20\",\"Hour\":\"9\",\"Year\":\"2005\",\"Month\":\"4\",\"Minute\":\"0\",\"@PubStatus\":\"medline\"},{\"Day\":\"15\",\"Hour\":\"9\",\"Year\":\"2005\",\"Month\":\"2\",\"Minute\":\"0\",\"@PubStatus\":\"entrez\"}]},\"ArticleIdList\":{\"ArticleId\":[{\"#text\":\"15707905\",\"@IdType\":\"pubmed\"},{\"#text\":\"10.1016/j.neuropsychologia.2004.11.007\",\"@IdType\":\"doi\"},{\"#text\":\"S0028-3932(04)00283-0\",\"@IdType\":\"pii\"}]},\"PublicationStatus\":\"ppublish\"},\"MedlineCitation\":{\"PMID\":{\"#text\":\"15707905\",\"@Version\":\"1\"},\"@Owner\":\"NLM\",\"@Status\":\"MEDLINE\",\"Article\":{\"Journal\":{\"ISSN\":{\"#text\":\"0028-3932\",\"@IssnType\":\"Print\"},\"Title\":\"Neuropsychologia\",\"JournalIssue\":{\"Issue\":\"2\",\"Volume\":\"43\",\"PubDate\":{\"Year\":\"2005\"},\"@CitedMedium\":\"Print\"},\"ISOAbbreviation\":\"Neuropsychologia\"},\"Abstract\":{\"AbstractText\":\"Performances
        of memorized piano compositions unfold via dynamic integrations of motor,
        perceptual, cognitive, and emotive operations. The functional neuroanatomy
        of such elaborately skilled achievements was characterized in the present
        study by using (15)0-water positron emission tomography to image blindfolded
        pianists performing a concerto by J.S. Bach. The resulting brain activity
        was referenced to that for bimanual performance of memorized major scales.
        Scales and concerto performances both activated primary motor cortex, corresponding
        somatosensory areas, inferior parietal cortex, supplementary motor area, motor
        cingulate, bilateral superior and middle temporal cortex, right thalamus,
        anterior and posterior cerebellum. Regions specifically supporting the concerto
        performance included superior and middle temporal cortex, planum polare, thalamus,
        basal ganglia, posterior cerebellum, dorsolateral premotor cortex, right insula,
        right supplementary motor area, lingual gyrus, and posterior cingulate. Areas
        specifically implicated in generating and playing scales were posterior cingulate,
        middle temporal, right middle frontal, and right precuneus cortices, with
        lesser increases in right hemispheric superior temporal, temporoparietal,
        fusiform, precuneus, and prefrontal cortices, along with left inferior frontal
        gyrus. Finally, much greater deactivations were present for playing the concerto
        than scales. This seems to reflect a deeper attentional focus in which tonically
        active orienting and evaluative processes, among others, are suspended. This
        inference is supported by observed deactivations in posterior cingulate, parahippocampus,
        precuneus, prefrontal, middle temporal, and posterior cerebellar cortices.
        For each of the foregoing analyses, a distributed set of interacting localized
        functions is outlined for future test.\"},\"Language\":\"eng\",\"@PubModel\":\"Print\",\"AuthorList\":{\"Author\":[{\"@ValidYN\":\"Y\",\"ForeName\":\"Lawrence
