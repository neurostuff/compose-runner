ressing
        a Paradox: Dual Strategies for Creative Performance in Introspective and Extrospective
        Networks.\",\"description\":\"Neuroimaging studies of internally generated
        behaviors have shown seemingly paradoxical results regarding the dorsolateral
        prefrontal cortex (DLPFC), which has been found to activate, not activate
        or even deactivate relative to control conditions. On the one hand, the DLPFC
        has been argued to exert top-down control over generative thought by inhibiting
        habitual responses; on the other hand, a deactivation and concomitant decrease
        in monitoring and focused attention has been suggested to facilitate spontaneous
        associations and novel insights. Here, we demonstrate that prefrontal engagement
        in creative cognition depends dramatically on experimental conditions, that
        is, the goal of the task. We instructed professional pianists to perform improvisations
        on a piano keyboard during fMRI and play, either with a certain emotional
        content (happy/fearful), or using certain keys (tonal/atonal pitch-sets).
        We found lower activity in primarily the right DLPFC, dorsal premotor cortex
        and inferior parietal cortex during emotional conditions compared with pitch-set
        conditions. Furthermore, the DLPFC was functionally connected to the default
        mode network during emotional conditions and to the premotor network during
        pitch-set conditions. The results thus support the notion of two broad cognitive
        strategies for creative problem solving, relying on extrospective and introspective
        neural circuits, respectively.\",\"publication\":\"Cerebral cortex (New York,
        N.Y. : 1991)\",\"doi\":\"10.1093/cercor/bhv130\",\"pmid\":\"26088973\",\"authors\":\"Pinho
