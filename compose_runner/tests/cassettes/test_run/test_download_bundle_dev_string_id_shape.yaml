d\":null,\"values\":[]},{\"id\":\"7yH9fPoYrU2y\",\"coordinates\":[-15.0,-46.0,33.0],\"kind\":\"unknown\",\"space\":\"TAL\",\"image\":null,\"label_id\":null,\"values\":[]},{\"id\":\"4NSNR5YSnXP9\",\"coordinates\":[-4.0,59.0,26.0],\"kind\":\"unknown\",\"space\":\"TAL\",\"image\":null,\"label_id\":null,\"values\":[]},{\"id\":\"5CmiX6vFw9mY\",\"coordinates\":[-8.0,48.0,43.0],\"kind\":\"unknown\",\"space\":\"TAL\",\"image\":null,\"label_id\":null,\"values\":[]},{\"id\":\"6Gv4r9KiBHRj\",\"coordinates\":[21.0,-14.0,72.0],\"kind\":\"unknown\",\"space\":\"TAL\",\"image\":null,\"label_id\":null,\"values\":[]},{\"id\":\"5UNEZVmsp3qj\",\"coordinates\":[24.0,-20.0,-18.0],\"kind\":\"unknown\",\"space\":\"TAL\",\"image\":null,\"label_id\":null,\"values\":[]},{\"id\":\"32BP2xWSCLwE\",\"coordinates\":[-29.0,-15.0,70.0],\"kind\":\"unknown\",\"space\":\"TAL\",\"image\":null,\"label_id\":null,\"values\":[]}],\"images\":[]}]},{\"id\":\"3TcQUrv9AqfE\",\"created_at\":\"2022-06-02T17:12:09.250150+00:00\",\"updated_at\":\"2023-07-17T03:27:48.613627+00:00\",\"user\":null,\"name\":\"Music
        listening engages specific cortical regions within the temporal lobes: Differences
        between musicians and non-musicians.\",\"description\":\"Music and speech
        are two of the most relevant and common sounds in the human environment. Perceiving
        and processing these two complex acoustical signals rely on a hierarchical
        functional network distributed throughout several brain regions within and
        beyond the auditory cortices. Given their similarities, the neural bases for
        processing these two complex sounds overlap to a certain degree, but particular
        brain regions may show selectivity for one or the other acoustic category,
        which we aimed to identify. We examined 53 subjects (28 of them professional
        musicians) by functional magnetic resonance imaging (fMRI), using a paradigm
        designed to identify regions showing increased activity in response to different
        types of musical stimuli, compared to different types of complex sounds, such
        as speech and non-linguistic vocalizations. We found a region in the anterior
        portion of the superior temporal gyrus (aSTG) (planum polare) that showed
        preferential activity in response to musical stimuli and was present in all
        our subjects, regardless of musical training, and invariant across different
        musical instruments (violin, piano or synthetic piano). Our data show that
        this cortical region is preferentially involved in processing musical, as
        compared to other complex sounds, suggesting a functional role as a second-order
        relay, possibly integrating acoustic characteristics intrinsic to music (e.g.,
        melody extraction). Moreover, we assessed whether musical experience modulates
        the response of cortical regions involved in music processing and found evidence
        of functional differences between musicians and non-musicians during music
        listening. In particular, bilateral activation of the planum polare was more
        prevalent, but not exclusive, in musicians than non-musicians, and activation
        of the right posterior portion of the superior temporal gyrus (planum temporale)
        differed between groups. Our results provide evidence of functional specialization
        for music processing in specific regions of the auditory cortex and show domain-specific
        functional differences possibly correlated with musicianship.\",\"publication\":\"Cortex;
        a journal devoted to the study of the nervous system and behavior\",\"doi\":\"10.1016/j.cortex.2014.07.013\",\"pmid\":\"25173956\",\"authors\":\"Angulo-Perkins
