        training-dependent representation of individual finger movements in the primary
        motor cortex.\",\"description\":\"We investigated the effects of long-term
        training on the neural representation of individual finger movements in the
        primary sensorimotor cortex. One group of participants (trained group) included
        subjects trained in playing the piano (mean years of experience\u202F=\u202F17.9;
        range\u202F=\u202F9-26; n\u202F=\u202F20). The other group of participants
        (novice group) had no prior experience (n\u202F=\u202F20). All participants
        performed finger-tapping movements using either of the four digits of the
        hand (index, middle, ring, and little fingers). Functional magnetic resonance
        imaging (fMRI) was used to analyze the spatial activation patterns elicited
        by individual finger movements. Subsequently, we tried to classify the finger
        that was being moved using a multi-voxel pattern analysis (MVPA). Our results
        showed significantly higher-than-chance classification accuracies in both
        primary motor cortex (M1) and somatosensory cortex (S1) contralateral to the
        hand. We also found significantly lower classification accuracies for both
        hands in the trained group compared with the novice group in M1, without significant
        differences in the average signal changes and the number of activated voxels
        for individual fingers or overlap between digits. Representational similarity
        analysis (RSA) also demonstrated the differences in similarity patterns of
        activations between the trained and novice groups in M1. Our results indicate
        the modulation of neural representations of individual finger movements of
        M1 due to long-term training.\",\"publication\":\"NeuroImage\",\"doi\":\"10.1016/j.neuroimage.2019.116051\",\"pmid\":\"31351164\",\"authors\":\"Kenji
