        E\",\"year\":2016,\"metadata\":null,\"source\":\"neuroquery\",\"source_id\":\"26584868\",\"source_updated_at\":null,\"analyses\":[{\"id\":\"6aQSVc6jP8ia\",\"user\":null,\"name\":\"t0015\",\"metadata\":null,\"description\":null,\"conditions\":[],\"weights\":[],\"points\":[{\"id\":\"5sqsSQk5Tr6t\",\"coordinates\":[-29.0,-10.0,-12.0],\"kind\":\"unknown\",\"space\":\"MNI\",\"image\":null,\"label_id\":null,\"values\":[]},{\"id\":\"7GRnAATWPEAK\",\"coordinates\":[-18.0,-3.0,-14.0],\"kind\":\"unknown\",\"space\":\"MNI\",\"image\":null,\"label_id\":null,\"values\":[]},{\"id\":\"8HSBDCpJTFsb\",\"coordinates\":[6.0,-88.0,0.0],\"kind\":\"unknown\",\"space\":\"MNI\",\"image\":null,\"label_id\":null,\"values\":[]},{\"id\":\"7jbQRG5WGgUb\",\"coordinates\":[6.0,-78.0,-11.0],\"kind\":\"unknown\",\"space\":\"MNI\",\"image\":null,\"label_id\":null,\"values\":[]},{\"id\":\"4RMaxY4A2peG\",\"coordinates\":[29.0,2.0,-3.0],\"kind\":\"unknown\",\"space\":\"MNI\",\"image\":null,\"label_id\":null,\"values\":[]},{\"id\":\"5TkxYG2qPGDg\",\"coordinates\":[14.0,-25.0,-3.0],\"kind\":\"unknown\",\"space\":\"MNI\",\"image\":null,\"label_id\":null,\"values\":[]},{\"id\":\"4HCBheuPxc83\",\"coordinates\":[-47.0,-1.0,-11.0],\"kind\":\"unknown\",\"space\":\"MNI\",\"image\":null,\"label_id\":null,\"values\":[]},{\"id\":\"7DhUV8VXBHnx\",\"coordinates\":[66.0,-21.0,19.0],\"kind\":\"unknown\",\"space\":\"MNI\",\"image\":null,\"label_id\":null,\"values\":[]},{\"id\":\"4KGR8ihK7TRQ\",\"coordinates\":[63.0,-24.0,3.0],\"kind\":\"unknown\",\"space\":\"MNI\",\"image\":null,\"label_id\":null,\"values\":[]},{\"id\":\"4HbaufRhLf7u\",\"coordinates\":[69.0,-13.0,39.0],\"kind\":\"unknown\",\"space\":\"MNI\",\"image\":null,\"label_id\":null,\"values\":[]}],\"images\":[]}]},{\"id\":\"Z2BfJNL3tVMo\",\"created_at\":\"2025-12-02T22:57:38.846116+00:00\",\"updated_at\":null,\"user\":null,\"name\":\"Musical
        training induces functional and structural auditory\u2010motor network plasticity
        in young adults\",\"description\":\"Playing music requires a strong coupling
        of perception and action mediated by multimodal integration of brain regions,
        which can be described as network connections measured by anatomical and functional
        correlations between regions. However, the structural and functional connectivities
        within and between the auditory and sensorimotor networks after long-term
        musical training remain largely uninvestigated. Here, we compared the structural
        connectivity (SC) and resting-state functional connectivity (rs-FC) within
        and between the two networks in 29 novice healthy young adults before and
        after musical training (piano) with those of another 27 novice participants
        who were evaluated longitudinally but with no intervention. In addition, a
        correlation analysis was performed between the changes in FC or SC with practice
        time in the training group. As expected, participants in the training group
        showed increased FC within the sensorimotor network and increased FC and SC
        of the auditory-motor network after musical training. Interestingly, we further
        found that the changes in FC within the sensorimotor network and SC of the
        auditory-motor network were positively correlated with practice time. Our
        results indicate that musical training could induce enhanced local interaction
        and global integration between musical performance-related regions, which
        provides insights into the mechanism of brain plasticity in young adults.\",\"publication\":\"Human
        Brain Mapping\",\"doi\":\"10.1002/hbm.23989\",\"pmid\":\"29400420\",\"authors\":\"Qiongling
