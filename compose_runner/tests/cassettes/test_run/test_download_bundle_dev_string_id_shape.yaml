        and recall of finger sequences in experienced pianists compared with musically
        naive controls: a combined behavioral and functional imaging study.\",\"description\":\"Long-term
        intensive sensorimotor training alters functional representation of the motor
        and sensory system and might even result in structural changes. However, there
        is not much knowledge about how previous training impacts learning transfer
        and functional representation. We tested 14 amateur pianists and 15 musically
        na\xEFve participants in a short-term finger sequence training procedure,
        differing considerably from piano playing and measured associated functional
        representation with functional magnetic resonance imaging. The conditions
        consisted of encoding a finger sequence indicated by hand symbols (\\\"sequence
        encoding\\\") and subsequently replaying the sequence from memory, both with
        and without auditory feedback (\\\"sequence retrieval\\\"). Piano players
        activated motor areas and the mirror neuron system more strongly than musically
        na\xEFve participants during encoding. When retrieving the sequence, musically
        na\xEFve participants showed higher activation in similar brain areas. Thus,
        retrieval activations of na\xEFve participants were comparable to encoding
        activations of piano players, who during retrieval performed the sequences
        more accurately despite lower motor activations. Interestingly, both groups
        showed primary auditory activation even during sequence retrieval without
        auditory feedback, supporting previous reports about coactivation of the auditory
        cortex after learned association with motor performance. When playing with
        auditory feedback, only pianists lateralized to the left auditory cortex.
        During encoding activation in left primary somatosensory cortex in the height
        of the finger representations had a predictive value for increased motor performance
        later on (error rates). Contrarily, decreased performance was associated with
        increased visual cortex activation during encoding. Our study extends previous
        reports about training transfer of motor knowledge resulting in superior training
        effects in musicians. Performance increase went along with activity in motor
