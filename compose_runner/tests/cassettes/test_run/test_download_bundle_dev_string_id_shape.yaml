        neural variability related to stimulus quality and response times in perceptual
        decision-making\",\"description\":\"According to sequential sampling models,
        perceptual decision-making is based on accumulation of noisy evidence towards
        a decision threshold. The speed with which a decision is reached is determined
        by both the quality of incoming sensory information and random trial-by-trial
        variability in the encoded stimulus representations. To investigate those
        decision dynamics at the neural level, participants made perceptual decisions
        while functional magnetic resonance imaging (fMRI) was conducted. On each
        trial, participants judged whether an image presented under conditions of
        high, medium, or low visual noise showed a piano or a chair. Higher stimulus
        quality (lower visual noise) was associated with increased activation in bilateral
        medial occipito-temporal cortex and ventral striatum. Lower stimulus quality
        was related to stronger activation in posterior parietal cortex (PPC) and
        dorsolateral prefrontal cortex (DLPFC). When stimulus quality was fixed, faster
        response times were associated with a positive parametric modulation of activation
        in medial prefrontal and orbitofrontal cortex, while slower response times
        were again related to more activation in PPC, DLPFC and insula. Our results
        suggest that distinct neural networks were sensitive to the quality of stimulus
        information, and to trial-to-trial variability in the encoded stimulus representations,
        but that reaching a decision was a consequence of their joint activity.\",\"publication\":\"Neuropsychologia\",\"doi\":\"10.1016/j.neuropsychologia.2018.01.040\",\"pmid\":\"29408524\",\"authors\":\"S.
        Bode; Daniel Bennett; David K. Sewell; Bryan Paton; G. Egan; Philip L. Smith;
        Carsten Murawski\",\"year\":2018,\"metadata\":{\"slug\":\"29408524-10-1016-j-neuropsychologia-2018-01-040\",\"source\":\"semantic_scholar\",\"keywords\":[\"Decision
        difficulty\",\"Evidence accumulation\",\"Functional magnetic resonance imaging\",\"Perceptual
        decision-making\",\"Sequential sampling models\"],\"raw_metadata\":{\"pubmed\":{\"PubmedData\":{\"History\":{\"PubMedPubDate\":[{\"Day\":\"2\",\"Year\":\"2017\",\"Month\":\"10\",\"@PubStatus\":\"received\"},{\"Day\":\"25\",\"Year\":\"2018\",\"Month\":\"1\",\"@PubStatus\":\"revised\"},{\"Day\":\"27\",\"Year\":\"2018\",\"Month\":\"1\",\"@PubStatus\":\"accepted\"},{\"Day\":\"7\",\"Hour\":\"6\",\"Year\":\"2018\",\"Month\":\"2\",\"Minute\":\"0\",\"@PubStatus\":\"pubmed\"},{\"Day\":\"29\",\"Hour\":\"6\",\"Year\":\"2019\",\"Month\":\"1\",\"Minute\":\"0\",\"@PubStatus\":\"medline\"},{\"Day\":\"7\",\"Hour\":\"6\",\"Year\":\"2018\",\"Month\":\"2\",\"Minute\":\"0\",\"@PubStatus\":\"entrez\"}]},\"ArticleIdList\":{\"ArticleId\":[{\"#text\":\"29408524\",\"@IdType\":\"pubmed\"},{\"#text\":\"10.1016/j.neuropsychologia.2018.01.040\",\"@IdType\":\"doi\"},{\"#text\":\"S0028-3932(18)30046-0\",\"@IdType\":\"pii\"}]},\"PublicationStatus\":\"ppublish\"},\"MedlineCitation\":{\"PMID\":{\"#text\":\"29408524\",\"@Version\":\"1\"},\"@Owner\":\"NLM\",\"@Status\":\"MEDLINE\",\"Article\":{\"Journal\":{\"ISSN\":{\"#text\":\"1873-3514\",\"@IssnType\":\"Electronic\"},\"Title\":\"Neuropsychologia\",\"JournalIssue\":{\"Volume\":\"111\",\"PubDate\":{\"Year\":\"2018\",\"Month\":\"Mar\"},\"@CitedMedium\":\"Internet\"},\"ISOAbbreviation\":\"Neuropsychologia\"},\"Abstract\":{\"AbstractText\":\"According
        to sequential sampling models, perceptual decision-making is based on accumulation
        of noisy evidence towards a decision threshold. The speed with which a decision
        is reached is determined by both the quality of incoming sensory information
        and random trial-by-trial variability in the encoded stimulus representations.
        To investigate those decision dynamics at the neural level, participants made
        perceptual decisions while functional magnetic resonance imaging (fMRI) was
        conducted. On each trial, participants judged whether an image presented under
        conditions of high, medium, or low visual noise showed a piano or a chair.
        Higher stimulus quality (lower visual noise) was associated with increased
        activation in bilateral medial occipito-temporal cortex and ventral striatum.
        Lower stimulus quality was related to stronger activation in posterior parietal
        cortex (PPC) and dorsolateral prefrontal cortex (DLPFC). When stimulus quality
        was fixed, faster response times were associated with a positive parametric
        modulation of activation in medial prefrontal and orbitofrontal cortex, while
        slower response times were again related to more activation in PPC, DLPFC
        and insula. Our results suggest that distinct neural networks were sensitive
        to the quality of stimulus information, and to trial-to-trial variability
        in the encoded stimulus representations, but that reaching a decision was
        a consequence of their joint activity.\",\"CopyrightInformation\":\"Copyright
