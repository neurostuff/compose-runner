        blind people hear better?\",\"description\":\"For centuries, anecdotal evidence
        such as the perfect pitch of the blind piano tuner or blind musician has supported
        the notion that individuals who have lost their sight early in life have superior
        hearing abilities compared with sighted people. Recently, auditory psychophysical
        and functional imaging studies have identified that specific auditory enhancements
        in the early blind can be linked to activation in extrastriate visual cortex,
        suggesting crossmodal plasticity. Furthermore, the nature of the sensory reorganization
        in occipital cortex supports the concept of a task-based functional cartography
        for the cerebral cortex rather than a sensory-based organization. In total,
        studies of early-blind individuals provide valuable insights into mechanisms
        of cortical plasticity and principles of cerebral organization.\",\"publication\":\"Trends
        in cognitive sciences\",\"doi\":\"10.1016/j.tics.2022.08.016\",\"pmid\":\"36207258\",\"authors\":\"Carina
        J Sabourin, Yaser Merrikhi, Stephen G Lomber\",\"year\":2022,\"metadata\":null,\"source\":\"neurosynth\",\"source_id\":null,\"source_updated_at\":null,\"analyses\":[{\"id\":\"6NGApraDbfH6\",\"user\":null,\"name\":\"Table
