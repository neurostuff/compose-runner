        brain mapping\",\"JournalIssue\":{\"Issue\":\"5\",\"Volume\":\"39\",\"PubDate\":{\"Year\":\"2018\",\"Month\":\"May\"},\"@CitedMedium\":\"Internet\"},\"ISOAbbreviation\":\"Hum
        Brain Mapp\"},\"Abstract\":{\"AbstractText\":\"Playing music requires a strong
        coupling of perception and action mediated by multimodal integration of brain
        regions, which can be described as network connections measured by anatomical
        and functional correlations between regions. However, the structural and functional
        connectivities within and between the auditory and sensorimotor networks after
        long-term musical training remain largely uninvestigated. Here, we compared
        the structural connectivity (SC) and resting-state functional connectivity
        (rs-FC) within and between the two networks in 29 novice healthy young adults
        before and after musical training (piano) with those of another 27 novice
        participants who were evaluated longitudinally but with no intervention. In
        addition, a correlation analysis was performed between the changes in FC or
        SC with practice time in the training group. As expected, participants in
        the training group showed increased FC within the sensorimotor network and
        increased FC and SC of the auditory-motor network after musical training.
        Interestingly, we further found that the changes in FC within the sensorimotor
        network and SC of the auditory-motor network were positively correlated with
        practice time. Our results indicate that musical training could induce enhanced
        local interaction and global integration between musical performance-related
        regions, which provides insights into the mechanism of brain plasticity in
        young adults.\",\"CopyrightInformation\":\"\xA9 2018 Wiley Periodicals, Inc.\"},\"Language\":\"eng\",\"@PubModel\":\"Print-Electronic\",\"AuthorList\":{\"Author\":[{\"@ValidYN\":\"Y\",\"ForeName\":\"Qiongling\",\"Initials\":\"Q\",\"LastName\":\"Li\",\"AffiliationInfo\":[{\"Affiliation\":\"School
