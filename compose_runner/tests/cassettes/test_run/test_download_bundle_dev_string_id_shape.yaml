        oscillatory patterns are associated with error prediction during music performance
        and are altered in musician's dystonia.\",\"description\":\"Skilled performance
        requires the ability to monitor ongoing behavior, detect errors in advance
        and modify the performance accordingly. The acquisition of fast predictive
        mechanisms might be possible due to the extensive training characterizing
        expertise performance. Recent EEG studies on piano performance reported a
        negative event-related potential (ERP) triggered in the ACC 70 ms before performance
        errors (pitch errors due to incorrect keypress). This ERP component, termed
        pre-error related negativity (pre-ERN), was assumed to reflect processes of
        error detection in advance. However, some questions remained to be addressed:
        (i) Does the electrophysiological marker prior to errors reflect an error
        signal itself or is it related instead to the implementation of control mechanisms?
        (ii) Does the posterior frontomedial cortex (pFMC, including ACC) interact
        with other brain regions to implement control adjustments following motor
        prediction of an upcoming error? (iii) Can we gain insight into the electrophysiological
        correlates of error prediction and control by assessing the local neuronal
        synchronization and phase interaction among neuronal populations? (iv) Finally,
        are error detection and control mechanisms defective in pianists with musician's
        dystonia (MD), a focal task-specific dystonia resulting from dysfunction of
        the basal ganglia-thalamic-frontal circuits? Consequently, we investigated
        the EEG oscillatory and phase synchronization correlates of error detection
        and control during piano performances in healthy pianists and in a group of
        pianists with MD. In healthy pianists, the main outcomes were increased pre-error
        theta and beta band oscillations over the pFMC and 13-15 Hz phase synchronization,
        between the pFMC and the right lateral prefrontal cortex, which predicted
        corrective mechanisms. In MD patients, the pattern of phase synchronization
        appeared in a different frequency band (6-8 Hz) and correlated with the severity
        of the disorder. The present findings shed new light on the neural mechanisms,
        which might implement motor prediction by means of forward control processes,
        as they function in healthy pianists and in their altered form in patients
        with MD.\",\"publication\":\"NeuroImage\",\"doi\":\"10.1016/j.neuroimage.2010.12.050\",\"pmid\":\"21195188\",\"authors\":\"Ruiz
        MH, Strubing F, Jabusch HC, Altenmuller E\",\"year\":2011,\"metadata\":null,\"source\":\"neurosynth\",\"source_id\":\"21195188\",\"source_updated_at\":null,\"analyses\":[{\"id\":\"7qDEfBDx675z\",\"user\":null,\"name\":\"32635\",\"metadata\":null,\"description\":null,\"conditions\":[],\"weights\":[],\"points\":[{\"id\":\"6zFeKZn2TjK2\",\"coordinates\":[1.0,2.0,3.0],\"kind\":\"unknown\",\"space\":\"UNKNOWN\",\"image\":null,\"label_id\":null,\"values\":[]}],\"images\":[]}]},{\"id\":\"83wU4Laggabu\",\"created_at\":\"2022-06-02T17:41:45.026305+00:00\",\"updated_at\":\"2024-03-21T20:00:40.386050+00:00\",\"user\":null,\"name\":\"Goal-independent
        mechanisms for free response generation: Creative and pseudo-random performance
        share neural substrates\",\"description\":\"To what extent free response generation
        in different tasks uses common and task-specific neurocognitive processes
        has remained unclear. Here, we investigated overlap and differences in neural
        activity during musical improvisation and pseudo-random response generation.
        Brain activity was measured using fMRI in a group of professional classical
        pianists, who performed musical improvisation of melodies, pseudo-random key-presses
        and a baseline condition (sight-reading), on either two, six or twelve keys
        on a piano keyboard. The results revealed an extensive overlap in neural activity
        between the two generative conditions. Active regions included the dorsolateral
        and dorsomedial prefrontal cortices, inferior frontal gyrus, anterior cingulate
        cortex and pre-SMA. No regions showed higher activity in improvisation than
        in pseudo-random generation. These findings suggest that the activated regions
        fulfill generic functions that are utilized in different types of free generation
        tasks, independent of overall goal. In contrast, pseudo-random generation
        was accompanied by higher activity than improvisation in several regions.
        This presumably reflects the participants' musical expertise as well as the
        pseudo-random generation task's high load on attention, working memory, and
        executive control. The results highlight the significance of using naturalistic
        tasks to study human behavior and cognition. No brain activity was related
        to the size of the response set. We discuss that this may reflect that the
        musicians were able to use specific strategies for improvisation, by which
        there was no simple relationship between response set size and neural activity.\",\"publication\":\"NeuroImage\",\"doi\":null,\"pmid\":\"21782960\",\"authors\":\"de
