        cortex in dementia with Lewy bodies: magnetic resonance imaging study\",\"venue\":\"The
        British journal of psychiatry : the journal of mental science\",\"authors\":[{\"name\":\"John-Paul
        Taylor\",\"authorId\":\"123680906\"},{\"name\":\"M. Firbank\",\"authorId\":\"4079574\"},{\"name\":\"Jiabao
        He\",\"authorId\":\"3202096\"},{\"name\":\"Nicola Barnett\",\"authorId\":\"35082918\"},{\"name\":\"S.
        Pearce\",\"authorId\":\"2094853002\"},{\"name\":\"Anthea Livingstone\",\"authorId\":\"36371858\"},{\"name\":\"Q.
        Vuong\",\"authorId\":\"37629922\"},{\"name\":\"I. McKeith\",\"authorId\":\"2490125\"},{\"name\":\"J.
        O'Brien\",\"authorId\":\"69060515\"}],\"paperId\":\"11749aff78badf3899794cc7e41ce76d49b137fb\",\"abstract\":\"Background
        Visual hallucinations and visuoperceptual deficits are common in dementia
        with Lewy bodies, suggesting that cortical visual function may be abnormal.
        Aims To investigate: (1) cortical visual function using functional magnetic
        resonance imaging (fMRI); and (2) the nature and severity of perfusion deficits
        in visual areas using arterial spin labelling (ASL)-MRI. Method In total,
        17 participants with dementia with Lewy bodies (DLB group) and 19 similarly
        aged controls were presented with simple visual stimuli (checkerboard, moving
        dots, and objects) during fMRI and subsequently underwent ASL-MRI (DLB group
        n = 15, control group n = 19). Results Functional activations were evident
        in visual areas in both the DLB and control groups in response to checkerboard
        and objects stimuli but reduced visual area V5/MT (middle temporal) activation
        occurred in the DLB group in response to motion stimuli. Posterior cortical
        perfusion deficits occurred in the DLB group, particularly in higher visual
        areas. Conclusions Higher visual areas, particularly occipito-parietal, appear
        abnormal in dementia with Lewy bodies, while there is a preservation of function
        in lower visual areas (V1 and V2/3).\",\"isOpenAccess\":true,\"openAccessPdf\":{\"url\":\"https://www.cambridge.org/core/services/aop-cambridge-core/content/view/2B67A2DB6BD285753DD2BB9A001A021C/S0007125000079563a.pdf/div-class-title-visual-cortex-in-dementia-with-lewy-bodies-magnetic-resonance-imaging-study-div.pdf\",\"status\":\"BRONZE\",\"license\":null,\"disclaimer\":\"Notice:
        Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC3365275,
        which is subject to the license by the author or copyright owner provided
        with this content. Please go to the source to verify the license and copyright
        information for your use.\"},\"publicationDate\":\"2012-03-28\"}}},\"source_id\":null,\"created_at\":\"2025-12-04T10:06:46.739673+00:00\",\"updated_at\":null,\"description\":\"BACKGROUND:
        Visual hallucinations and visuoperceptual deficits are common in dementia
        with Lewy bodies, suggesting that cortical visual function may be abnormal.\\n\\nAIMS:
        To investigate: (1) cortical visual function using functional magnetic resonance
        imaging (fMRI); and (2) the nature and severity of perfusion deficits in visual
        areas using arterial spin labelling (ASL)-MRI.\\n\\nMETHOD: In total, 17 participants
        with dementia with Lewy bodies (DLB group) and 19 similarly aged controls
        were presented with simple visual stimuli (checkerboard, moving dots, and
        objects) during fMRI and subsequently underwent ASL-MRI (DLB group n = 15,
        control group n = 19).\\n\\nRESULTS: Functional activations were evident in
        visual areas in both the DLB and control groups in response to checkerboard
        and objects stimuli but reduced visual area V5/MT (middle temporal) activation
        occurred in the DLB group in response to motion stimuli. Posterior cortical
        perfusion deficits occurred in the DLB group, particularly in higher visual
        areas.\\n\\nCONCLUSIONS: Higher visual areas, particularly occipito-parietal,
        appear abnormal in dementia with Lewy bodies, while there is a preservation
        of function in lower visual areas (V1 and V2/3).\",\"publication\":\"The British
        journal of psychiatry : the journal of mental science\",\"source_updated_at\":\"2025-12-04T10:07:40.354065+00:00\"},{\"id\":\"B2gUAfQgsLZx\",\"doi\":\"10.1186/s13195-014-0071-4\",\"name\":\"Differentiating
