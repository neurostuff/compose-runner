        Clinical\",\"JournalIssue\":{\"Volume\":\"32\",\"PubDate\":{\"Year\":\"2021\"},\"@CitedMedium\":\"Internet\"},\"ISOAbbreviation\":\"Neuroimage
        Clin\"},\"Abstract\":{\"AbstractText\":[{\"#text\":\"presence hallucinations
        (PH) are frequent in dementia with Lewy bodies (DLB), but their cortico-subcortical
        origin is unknown. Recent studies have defined key frontal and temporal areas
        contributing to the occurrence of PH (PH-network) and tested their relevance
        in subjects with Parkinson's disease (PD). With the present study, we aimed
        at disentangling the metabolic and dopaminergic correlates of pH as well as
        their relation to a recently defined PH brain network in DLB.\",\"@Label\":\"INTRODUCTION\"},{\"sup\":[\"18\",\"123\",\"18\",\"18\"],\"#text\":\"for
        the present study, we included 34 DLB subjects (10 with PH (PH\_+\_); 24 without
        PH (PH-)), who underwent F-FDG PET and I-FP-CIT SPECT imaging. We performed
        F-FDG PET group comparisons, as well as interregional correlation analyses
        using F-FDG PH-network regions as a seed.\",\"@Label\":\"METHODS\"},{\"sup\":[\"18\",\"18\",\"123\",\"18\"],\"#text\":\"PH\_+\_versus
        PH- had reduced F-FDG uptake in precentral, superior frontal and parietal
        gyri, involving ventral premotor cortex (vPMC) of the PH-network that showed
        strongly reduced functional connectivity with bilateral cortical regions.
        F-FDG vPMC uptake was negatively correlated with caudate I-FP-CIT uptake in
        PH+ (p\_=\_0.028) and interregional correlation analysis seeding from the
        vPMC showed widespread fronto-parietal F-FDG decreases in PH\_+\_.\",\"@Label\":\"RESULTS\"},{\"#text\":\"these
        findings uncover the pivotal role of vPMC (involved in a PH-network) and its
        cortico-striatal connections in association with PH in DLB, improving our
        understanding of psychosis in neurodegeneration.\",\"@Label\":\"DISCUSSION\"}],\"CopyrightInformation\":\"Copyright
