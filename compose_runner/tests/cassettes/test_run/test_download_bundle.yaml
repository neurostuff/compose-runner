        J Psychiatry\"},\"Abstract\":{\"AbstractText\":[{\"#text\":\"Visual hallucinations
        and visuoperceptual deficits are common in dementia with Lewy bodies, suggesting
        that cortical visual function may be abnormal.\",\"@Label\":\"BACKGROUND\",\"@NlmCategory\":\"BACKGROUND\"},{\"#text\":\"To
        investigate: (1) cortical visual function using functional magnetic resonance
        imaging (fMRI); and (2) the nature and severity of perfusion deficits in visual
        areas using arterial spin labelling (ASL)-MRI.\",\"@Label\":\"AIMS\",\"@NlmCategory\":\"OBJECTIVE\"},{\"#text\":\"In
        total, 17 participants with dementia with Lewy bodies (DLB group) and 19 similarly
        aged controls were presented with simple visual stimuli (checkerboard, moving
        dots, and objects) during fMRI and subsequently underwent ASL-MRI (DLB group
        n = 15, control group n = 19).\",\"@Label\":\"METHOD\",\"@NlmCategory\":\"METHODS\"},{\"#text\":\"Functional
        activations were evident in visual areas in both the DLB and control groups
        in response to checkerboard and objects stimuli but reduced visual area V5/MT
        (middle temporal) activation occurred in the DLB group in response to motion
        stimuli. Posterior cortical perfusion deficits occurred in the DLB group,
        particularly in higher visual areas.\",\"@Label\":\"RESULTS\",\"@NlmCategory\":\"RESULTS\"},{\"#text\":\"Higher
        visual areas, particularly occipito-parietal, appear abnormal in dementia
        with Lewy bodies, while there is a preservation of function in lower visual
        areas (V1 and V2/3).\",\"@Label\":\"CONCLUSIONS\",\"@NlmCategory\":\"CONCLUSIONS\"}]},\"Language\":\"eng\",\"@PubModel\":\"Print-Electronic\",\"GrantList\":{\"Grant\":{\"Agency\":\"Wellcome
