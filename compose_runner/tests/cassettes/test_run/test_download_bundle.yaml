        Anterior Insula: Core Region of Hallucinations in Cognitive Neurodegenerative
        Diseases\",\"venue\":\"PLoS ONE\",\"authors\":[{\"name\":\"F. Blanc\",\"authorId\":\"46841823\"},{\"name\":\"V.
