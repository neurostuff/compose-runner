        Brain Connectivity Patterns Associated with Visual Hallucinations in Dementia
        with Lewy Bodies\",\"description\":\"BACKGROUND: The presence of recurrent,
        complex visual hallucinations (VH) is among the core clinical features of
        dementia with Lewy bodies (DLB). It has been proposed that VH arise from a
        disrupted organization of functional brain networks. However, studies are
        still limited, especially investigating the resting-state functional brain
        features underpinning VH in patients with dementia.\\n\\nOBJECTIVE: The aim
        of the present pilot study was to investigate whether there were any alterations
        in functional connectivity associated with VH in DLB.\\n\\nMETHODS: Seed-based
        analyses and independent component analysis (ICA) of resting-state fMRI scans
        were carried out to explore differences in functional connectivity between
        DLB patients with and without VH.\\n\\nRESULTS: Seed-based analyses reported
        decreased connectivity of the lateral geniculate nucleus, the superior parietal
        lobule and the putamen with the medial frontal gyrus in DLB patients with
        VH. Visual areas showed a pattern of both decreased and increased functional
        connectivity. ICA revealed between-group differences in the default mode network
        (DMN).\\n\\nCONCLUSION: Functional connectivity analyses suggest dysfunctional
        top-down and bottom-up processes and DMN-related alterations in DLB patients
        with VH. This impairment might foster the generation of false visual images
        that are misinterpreted, ultimately resulting in VH.\",\"publication\":\"Journal
        of Alzheimer's disease reports\",\"doi\":\"10.3233/ADR-200288\",\"pmid\":\"34113787\",\"authors\":\"S.
        Pezzoli; Matteo De Marco; G. Zorzi; A. Cagnin; A. Venneri\",\"year\":2021,\"metadata\":{\"slug\":\"34113787-10-3233-adr-200288-pmc8150258\",\"source\":\"semantic_scholar\",\"keywords\":[\"Dementia
