    body:
      string: "{\"id\":\"ToisksSserJp\",\"name\":\"Studyset for Untitled\",\"user\":\"google-oauth2|118369890595388226948\",\"description\":\"\",\"publication\":null,\"doi\":null,\"pmid\":null,\"created_at\":\"2026-02-18T13:33:03.784175+00:00\",\"updated_at\":null,\"studies\":[{\"id\":\"49Bs2pQQbLB6\",\"created_at\":\"2025-12-04T10:06:46.739673+00:00\",\"updated_at\":null,\"user\":null,\"name\":\"Visual
        cortex in dementia with Lewy bodies: magnetic resonance imaging study\",\"description\":\"BACKGROUND:
        Visual hallucinations and visuoperceptual deficits are common in dementia
        with Lewy bodies, suggesting that cortical visual function may be abnormal.\\n\\nAIMS:
        To investigate: (1) cortical visual function using functional magnetic resonance
        imaging (fMRI); and (2) the nature and severity of perfusion deficits in visual
        areas using arterial spin labelling (ASL)-MRI.\\n\\nMETHOD: In total, 17 participants
        with dementia with Lewy bodies (DLB group) and 19 similarly aged controls
        were presented with simple visual stimuli (checkerboard, moving dots, and
        objects) during fMRI and subsequently underwent ASL-MRI (DLB group n = 15,
        control group n = 19).\\n\\nRESULTS: Functional activations were evident in
        visual areas in both the DLB and control groups in response to checkerboard
        and objects stimuli but reduced visual area V5/MT (middle temporal) activation
        occurred in the DLB group in response to motion stimuli. Posterior cortical
        perfusion deficits occurred in the DLB group, particularly in higher visual
        areas.\\n\\nCONCLUSIONS: Higher visual areas, particularly occipito-parietal,
        appear abnormal in dementia with Lewy bodies, while there is a preservation
        of function in lower visual areas (V1 and V2/3).\",\"publication\":\"The British
        journal of psychiatry : the journal of mental science\",\"doi\":\"10.1192/bjp.bp.111.099432\",\"pmid\":\"22500014\",\"authors\":\"John-Paul
