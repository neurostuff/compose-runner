        functional brain features underpinning VH in patients with dementia.\\n\\nOBJECTIVE:
        The aim of the present pilot study was to investigate whether there were any
        alterations in functional connectivity associated with VH in DLB.\\n\\nMETHODS:
        Seed-based analyses and independent component analysis (ICA) of resting-state
        fMRI scans were carried out to explore differences in functional connectivity
        between DLB patients with and without VH.\\n\\nRESULTS: Seed-based analyses
        reported decreased connectivity of the lateral geniculate nucleus, the superior
        parietal lobule and the putamen with the medial frontal gyrus in DLB patients
        with VH. Visual areas showed a pattern of both decreased and increased functional
