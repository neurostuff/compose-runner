        research & therapy\",\"JournalIssue\":{\"Issue\":\"9\",\"Volume\":\"6\",\"PubDate\":{\"Year\":\"2014\"},\"@CitedMedium\":\"Print\"},\"ISOAbbreviation\":\"Alzheimers
        Res Ther\"},\"Abstract\":{\"AbstractText\":[{\"#text\":\"Dementia with Lewy
        bodies (DLB) and Corticobasal Syndrome (CBS) are atypical parkinsonian disorders
        with fronto-subcortical and posterior cognitive dysfunction as common features.
        While visual hallucinations are a good predictor of Lewy body pathology and
        are rare in CBS, they are not exhibited in all cases of DLB. Given the clinical
        overlap between these disorders, neuropsychological and imaging markers may
        aid in distinguishing these entities.\",\"@Label\":\"INTRODUCTION\",\"@NlmCategory\":\"BACKGROUND\"},{\"#text\":\"Prospectively
        recruited case-control cohorts of CBS (n =31) and visual hallucination-free
        DLB (n =30), completed neuropsychological and neuropsychiatric measures as
        well as brain perfusion single-photon emission computed tomography and structural
        magnetic resonance imaging (MRI). Perfusion data were available for forty-two
        controls. Behavioural, perfusion, and cortical volume and thickness measures
        were compared between the groups to identify features that serve to differentiate
        them.\",\"@Label\":\"METHODS\",\"@NlmCategory\":\"METHODS\"},{\"#text\":\"The
        Lewy body with no hallucinations group performed more poorly on measures of
        episodic memory compared to the corticobasal group, including the delayed
        and cued recall portions of the California Verbal Learning Test (F (1, 42)
        =23.1, P <0.001 and F (1, 42) =14.0, P =0.001 respectively) and the delayed
        visual reproduction of the Wechsler Memory Scale-Revised (F (1, 36) =9.7,
        P =0.004). The Lewy body group also demonstrated reduced perfusion in the
        left occipital pole compared to the corticobasal group (F (1,57) =7.4, P =0.009).
        At autopsy, the Lewy body cases all demonstrated mixed dementia with Lewy
        bodies, Alzheimer's disease and small vessel arteriosclerosis, while the corticobasal
        cases demonstrated classical corticobasal degeneration in five, dementia with
        agyrophilic grains\u2009+\u2009corticobasal degeneration\u2009+\u2009cerebral
        amyloid angiopathy in one, Progressive Supranuclear Palsy in two, and Frontotemporal
        Lobar Degeneration-Ubiquitin/TAR DNA-binding protein 43 proteinopathy in one.
        MRI measures were not significantly different between the patient groups.\",\"@Label\":\"RESULTS\",\"@NlmCategory\":\"RESULTS\"},{\"#text\":\"Reduced
        perfusion in the left occipital region and worse episodic memory performance
        may help to distinguish between DLB cases who have never manifested with visual
        hallucinations and CBS at earlier stages of the disease. Development of reliable
        neuropsychological and imaging markers that improve diagnostic accuracy will
        become increasingly important as disease modifying therapies become available.\",\"@Label\":\"CONCLUSIONS\",\"@NlmCategory\":\"CONCLUSIONS\"}]},\"Language\":\"eng\",\"@PubModel\":\"Electronic-eCollection\",\"AuthorList\":{\"Author\":[{\"@ValidYN\":\"Y\",\"ForeName\":\"Michael
