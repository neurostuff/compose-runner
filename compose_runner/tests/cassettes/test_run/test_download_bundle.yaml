        Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC8403753,
        which is subject to the license by the author or copyright owner provided
        with this content. Please go to the source to verify the license and copyright
        information for your use.\"},\"publicationDate\":\"2021-08-23\"}}},\"source_id\":null,\"created_at\":\"2025-12-04T10:06:46.739673+00:00\",\"updated_at\":null,\"description\":\"INTRODUCTION:
        presence hallucinations (PH) are frequent in dementia with Lewy bodies (DLB),
        but their cortico-subcortical origin is unknown. Recent studies have defined
        key frontal and temporal areas contributing to the occurrence of PH (PH-network)
        and tested their relevance in subjects with Parkinson's disease (PD). With
        the present study, we aimed at disentangling the metabolic and dopaminergic
        correlates of pH as well as their relation to a recently defined PH brain
        network in DLB.\\n\\nMETHODS: for the present study, we included 34 DLB subjects
        (10 with PH (PH\_+\_); 24 without PH (PH-)), who underwent F-FDG PET and I-FP-CIT
        SPECT imaging. We performed F-FDG PET group comparisons, as well as interregional
        correlation analyses using F-FDG PH-network regions as a seed.\\n\\nRESULTS:
        PH\_+\_versus PH- had reduced F-FDG uptake in precentral, superior frontal
        and parietal gyri, involving ventral premotor cortex (vPMC) of the PH-network
        that showed strongly reduced functional connectivity with bilateral cortical
        regions. F-FDG vPMC uptake was negatively correlated with caudate I-FP-CIT
        uptake in PH+ (p\_=\_0.028) and interregional correlation analysis seeding
        from the vPMC showed widespread fronto-parietal F-FDG decreases in PH\_+\_.\\n\\nDISCUSSION:
        these findings uncover the pivotal role of vPMC (involved in a PH-network)
        and its cortico-striatal connections in association with PH in DLB, improving
        our understanding of psychosis in neurodegeneration.\",\"publication\":\"NeuroImage:
        Clinical\",\"source_updated_at\":\"2025-12-04T10:08:16.326081+00:00\"},{\"id\":\"xnnz3vaJWW5q\",\"doi\":\"10.3233/ADR-200288\",\"name\":\"Functional
        Brain Connectivity Patterns Associated with Visual Hallucinations in Dementia
