        Cretin\",\"authorId\":\"5646802\"},{\"name\":\"J. Foucher\",\"authorId\":\"2611255\"},{\"name\":\"J.
        Armspach\",\"authorId\":\"1760601\"},{\"name\":\"F. Rousseau\",\"authorId\":\"1723840\"}],\"paperId\":\"72222e58742f5889f1e29b37221ec0a68e77eac8\",\"abstract\":\"Objectives
        We investigated the neural basis of hallucinations Alzheimer's disease (AD)
        by applying voxel-based morphometry (VBM) to anatomical and functional data
        from the AD Neuroimaging Initiative. Methods AD patients with hallucinations,
        based on the Neuropsychiatric Inventory (NPI-Q) (AD-hallu group; n\u200A=\u200A39),
        were compared to AD patients without hallucinations matched for age, sex,
        educational level, handedness and MMSE (AD-c group; n\u200A=\u200A39). Focal
        brain volume on MRI was analyzed and compared between the two groups according
        to the VBM method. We also performed voxel-level correlations between brain
        volume and hallucinations intensity. A similar paradigm was used for the PET
        analysis. \u201CCore regions\u201D (i.e. regions identified in both MRI and
        PET analyses, simply done by retaining the clusters obtained from the two
        analyses that are overlapping) were then determined. Results Regions with
        relative atrophy in association with hallucinations were: anterior part of
        the right insula, left superior frontal gyrus and lingual gyri. Regions with
        relative hypometabolism in association with hallucinations were a large right
        ventral and dorsolateral prefrontal area. \\\"Core region\\\" in association
        with hallucinations was the right anterior part of the insula. Correlations
        between intensity of hallucinations and brain volume were found in the right
        anterior insula, precentral gyrus, superior temporal gyrus, and left precuneus.
        Correlations between intensity of hallucinations and brain hypometabolism
        were found in the left midcingulate gyrus. We checked the neuropathological
        status and we found that the 4 patients autopsied in the AD-hallu group had
        the mixed pathology AD and Dementia with Lewy bodies (DLB). Conclusion Neural
        basis of hallucinations in cognitive neurodegenerative diseases (AD or AD
        and DLB) include a right predominant anterior-posterior network, and the anterior
        insula as the core region. This study is coherent with the top-down/bottom-up
        hypotheses on hallucinations but also hypotheses of the key involvement of
        the anterior insula in hallucinations in cognitive neurodegenerative diseases.\",\"isOpenAccess\":true,\"openAccessPdf\":{\"url\":\"https://journals.plos.org/plosone/article/file?id=10.1371/journal.pone.0114774&type=printable\",\"status\":\"GOLD\",\"license\":\"CCBY\",\"disclaimer\":\"Notice:
        Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC4257732,
        which is subject to the license by the author or copyright owner provided
        with this content. Please go to the source to verify the license and copyright
        information for your use.\"},\"publicationDate\":\"2014-12-05\"}}},\"source_id\":null,\"created_at\":\"2025-12-04T05:27:32.256396+00:00\",\"updated_at\":null,\"description\":\"OBJECTIVES:
        We investigated the neural basis of hallucinations Alzheimer's disease (AD)
        by applying voxel-based morphometry (VBM) to anatomical and functional data
        from the AD Neuroimaging Initiative.\\n\\nMETHODS: AD patients with hallucinations,
        based on the Neuropsychiatric Inventory (NPI-Q) (AD-hallu group; n = 39),
        were compared to AD patients without hallucinations matched for age, sex,
        educational level, handedness and MMSE (AD-c group; n = 39). Focal brain volume
        on MRI was analyzed and compared between the two groups according to the VBM
        method. We also performed voxel-level correlations between brain volume and
        hallucinations intensity. A similar paradigm was used for the PET analysis.
        \\\"Core regions\\\" (i.e. regions identified in both MRI and PET analyses,
        simply done by retaining the clusters obtained from the two analyses that
        are overlapping) were then determined.\\n\\nRESULTS: Regions with relative
        atrophy in association with hallucinations were: anterior part of the right
        insula, left superior frontal gyrus and lingual gyri. Regions with relative
        hypometabolism in association with hallucinations were a large right ventral
        and dorsolateral prefrontal area. \\\"Core region\\\" in association with
        hallucinations was the right anterior part of the insula. Correlations between
        intensity of hallucinations and brain volume were found in the right anterior
        insula, precentral gyrus, superior temporal gyrus, and left precuneus. Correlations
        between intensity of hallucinations and brain hypometabolism were found in
        the left midcingulate gyrus. We checked the neuropathological status and we
        found that the 4 patients autopsied in the AD-hallu group had the mixed pathology
        AD and Dementia with Lewy bodies (DLB).\\n\\nCONCLUSION: Neural basis of hallucinations
        in cognitive neurodegenerative diseases (AD or AD and DLB) include a right
        predominant anterior-posterior network, and the anterior insula as the core
        region. This study is coherent with the top-down/bottom-up hypotheses on hallucinations
        but also hypotheses of the key involvement of the anterior insula in hallucinations
        in cognitive neurodegenerative diseases.\",\"publication\":\"PLoS ONE\",\"source_updated_at\":\"2025-12-04T05:29:34.272069+00:00\"}],\"created_at\":\"2026-02-18T13:33:03.784175+00:00\",\"updated_at\":null,\"description\":\"\",\"publication\":null,\"studyset_studies\":[{\"id\":\"49Bs2pQQbLB6\",\"curation_stub_uuid\":\"e52711d6-64a6-4722-9f67-1116a15bbf48\"},{\"id\":\"B2gUAfQgsLZx\",\"curation_stub_uuid\":\"190b4c4b-4a2d-422b-b835-9c4070863848\"},{\"id\":\"w5WxdYsT22uG\",\"curation_stub_uuid\":\"9a064221-5ee4-40bd-b0b9-53be048d9ae4\"},{\"id\":\"xnnz3vaJWW5q\",\"curation_stub_uuid\":\"85f91fa2-6ee7-44c4-bb55-a05109547b37\"},{\"id\":\"Zj6yDzz58d28\",\"curation_stub_uuid\":\"f9fd1630-9617-4dce-8767-4bba398d8fda\"}]},\"version\":null,\"annotations\":[{\"id\":\"UCYSGJ5nrd3o\",\"md5\":\"aceb01fc825f6fe99ede58ec2ef602c0\"}],\"neurostore_id\":\"ToisksSserJp\",\"url\":\"https://neurostore.org/api/studysets/ToisksSserJp\"}"
